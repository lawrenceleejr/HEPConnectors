name: Deploy poster to GitHub Pages

# Publishes to the gh-pages branch. Creating that branch auto-enables
# GitHub Pages on public repos, so no manual settings step (and no
# Pages-admin API call, which the default workflow token isn't allowed
# to make) is needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp poster.html _site/index.html
          cp poster-light.png poster-dark.png _site/ 2>/dev/null || true
          touch _site/.nojekyll
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
